    I18N.init(translations);
    
    // Direct language switch
    function doSwitch(lang) {
        var dict = translations[lang];
        if (!dict) return;
        localStorage.setItem('preferred-lang', lang);
        document.querySelectorAll('[data-i18n]').forEach(function(el) {
            var k = el.getAttribute('data-i18n');
            if (dict[k] !== undefined) el.innerHTML = dict[k];
        });
        document.documentElement.lang = (lang === 'zh') ? 'zh-CN' : lang;
        document.querySelectorAll('.lang-option').forEach(function(o) { o.classList.remove('active'); });
        document.querySelectorAll('[data-lang="' + lang + '"]').forEach(function(o) { o.classList.add('active'); });
        var cl = document.getElementById('currentLang');
        if (cl) cl.textContent = (lang === 'zh') ? '中文' : lang.toUpperCase();
        var dd = document.getElementById('langDropdown');
        if (dd) dd.classList.remove('show');
        if (typeof I18N !== 'undefined' && I18N.switchLang) I18N.switchLang(lang);
        
            }
    
    // Fix lang button
    var ls = document.getElementById('langSwitch');
    if (ls) { ls.setAttribute('onclick', "document.getElementById('langDropdown').classList.toggle('show')"); }

    function switchGalleryImg(el, src) {
        const main = document.getElementById('galleryMainImg');
        if (main) main.src = src;
        document.querySelectorAll('.gallery-thumb').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
    }

    // Dynamic product loading
    document.addEventListener('DOMContentLoaded', function() {
        if (typeof PRODUCTS_DATA === 'undefined' || typeof getUrlParam === 'undefined') return;
        
        const seriesId = getUrlParam('series');
        const variantName = getUrlParam('variant');
        
        let product = null;
        if (seriesId && variantName && typeof getProductBySeriesAndName !== 'undefined') {
            product = getProductBySeriesAndName(seriesId, variantName);
        }
        if (!product && typeof getAllProducts !== 'undefined') {
            const all = getAllProducts();
            product = all[0];
        }
        
        if (product) {
            renderProductDetail(product);
        }
    });
</script>
